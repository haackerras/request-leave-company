        var dayMatch = text.match(/(\d+)\s*天/);
        if (dayMatch) {
          totalMinutes += parseInt(dayMatch[1], 10) * 24 * 60;
          matched = true;
        }
        var hourMatch = text.match(/(\d+)\s*小?时/);
        if (hourMatch) {
          totalMinutes += parseInt(hourMatch[1], 10) * 60;
          matched = true;
        }
        var minuteMatch = text.match(/(\d+)\s*分/);
        if (minuteMatch) {
          totalMinutes += parseInt(minuteMatch[1], 10);
          matched = true;
        }
        if (!matched) {
          return null;
        }
        return totalMinutes * 60 * 1000;
      }

      function formatDuration(durationMs) {
        if (typeof durationMs !== 'number' || !isFinite(durationMs) || durationMs < 0) {
          return '';
        }
        var totalMinutes = Math.round(durationMs / 60000);
        var minutesPerDay = 24 * 60;
        var days = Math.floor(totalMinutes / minutesPerDay);
        var hours = Math.floor((totalMinutes % minutesPerDay) / 60);
        var minutes = totalMinutes % 60;
        var parts = [];
        if (days) {
          parts.push(days + '天');
        }
        if (hours) {
          parts.push(hours + '小时');
        }
        if (minutes || parts.length === 0) {
          parts.push(minutes + '分钟');
        }
        return parts.join('');
      }

      document.addEventListener('DOMContentLoaded', function () {
        var startNode = document.getElementById('start-time');
        var endNode = document.getElementById('end-time');
        if (!startNode || !endNode) {
          return;
        }
        var durationNode = document.getElementById('duration-text');
        var applyNode = document.getElementById('apply-time');
        var reviewNode = document.getElementById('review-time');

        var originalStart = parseTime(startNode.textContent);
        var originalEnd = parseTime(endNode.textContent);
        if (!originalStart || !originalEnd) {
          return;
        }

        var durationMs = 24 * 60 * 60 * 1000;

        var applyOriginal = applyNode ? parseTime(applyNode.textContent) : null;
        var reviewOriginal = reviewNode ? parseTime(reviewNode.textContent) : null;
        var applyHasSeconds = applyNode ? hasSeconds(applyNode.textContent) : false;
        var reviewHasSeconds = reviewNode ? hasSeconds(reviewNode.textContent) : false;

        var now = new Date();
        var currentStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 7, 0, 0, 0);
        var currentEnd = new Date(currentStart.getTime() + durationMs);

        startNode.textContent = formatDateTime(currentStart, true);
        endNode.textContent = formatDateTime(currentEnd, true);

        if (applyNode && applyOriginal) {
          var applyOffset = originalStart.getTime() - applyOriginal.getTime();
          var currentApply = new Date(currentStart.getTime() - applyOffset);
          applyNode.textContent = formatDateTime(currentApply, applyHasSeconds);
        }

        if (reviewNode && reviewOriginal) {
          var reviewOffset = originalStart.getTime() - reviewOriginal.getTime();
          var currentReview = new Date(currentStart.getTime() - reviewOffset);
          reviewNode.textContent = formatDateTime(currentReview, reviewHasSeconds);
        }

        //if (durationNode) {
          //durationNode.textContent = formatDuration(durationMs);
       // }//计算时间//
      });
    })();
    document.addEventListener('DOMContentLoaded', function () {
      var CSV_PATH = 'accounts.csv';
      var DEFAULT_CSV = 'account,password,name';
      var LEGACY_DEFAULT =
        'account,password,name\\n' +
        'student01,123456,陈奕潮\\n' +
        'student02,654321,王梓宁\\n' +
        'student03,pass2024,李夏雨';

      var accountsCsv = '';
      var accounts = {};
      var accountsReady = false;

      var loginForm = document.getElementById('login-form');
      var loginPanel = document.getElementById('login-panel');
      var appContent = document.getElementById('root');
      var accountInput = document.getElementById('login-account');
      var passwordInput = document.getElementById('login-password');
      var applicantNameNode = document.getElementById('applicant-name');
      var errorNode = document.getElementById('login-error');

      function ensureHeader(csvText) {
        var trimmed = (csvText || '').trim();
        if (!trimmed) {
          return DEFAULT_CSV;
        }
        var lines = trimmed.split(/\r?\n/);
        if (!/^account\s*,\s*password\s*,\s*name/i.test(lines[0])) {
          lines.unshift('account,password,name');
        }
        return lines.join('\n');
      }

      function normalizeCsvText(text) {
        var value = String(text || '');
        value = value.replace(/\r\n?/g, '\n'); // normalize CRLF/CR
        value = value.replace(/\\n/g, '\n');   // convert escaped \n to real newline if存在
        return value;
      }

      function stripSampleAccounts(csvText) {
        var lines = ensureHeader(csvText).split(/\r?\n/);
        var header = lines[0];
        var filtered = [header];
        var sampleSet = { student01: true, student02: true, student03: true };
        for (var i = 1; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line) {
            continue;
          }
          var parts = line.split(',');
          if (sampleSet[parts[0]]) {
            continue;
          }
          filtered.push(line);
        }
        return filtered.join('\n');
      }

      function parseCsvToMap(csvText) {
        var map = {};
        var lines = ensureHeader(csvText).split(/\r?\n/);
        for (var i = 1; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line) {
            continue;
          }
          var parts = line.split(',');
          if (parts.length < 3) {
            continue;
          }
          var account = parts[0].trim();
          var password = parts[1].trim();
          var name = parts.slice(2).join(',').trim();
          if (account) {
            map[account] = { password: password, displayName: name || account };
          }
        }
        return map;
      }

      function applyCsv(csvText) {
        accountsCsv = ensureHeader(stripSampleAccounts(normalizeCsvText(csvText)));
        accounts = parseCsvToMap(accountsCsv);
        accountsReady = true;
      }

      function fetchCsvFromFile() {
        return fetch(CSV_PATH + '?_=' + Date.now(), { cache: 'no-store' })
          .then(function (res) {
            if (!res.ok) {
              throw new Error('fetch failed');
            }
            return res.text();
          })
          .catch(function () {
            return DEFAULT_CSV;
          });
      }

      // 仅从CSV读取账户，不在前端新增/修改

      function setApplicantName(name) {
        if (applicantNameNode) {
          applicantNameNode.textContent = name;
        }
      }

      function setAccountDisplay() {}

      fetchCsvFromFile().then(function (text) {
        applyCsv(text);
      });

      if (loginForm) {
        loginForm.addEventListener('submit', function (event) {
          event.preventDefault();
          if (!accountsReady) {
            if (errorNode) {
              errorNode.textContent = '账号数据加载中，请稍后再试。';
            }
            return;
          }
          var account = accountInput ? accountInput.value.trim() : '';
          var password = passwordInput ? passwordInput.value : '';
          var accountInfo = accounts[account];

          if (!accountInfo || accountInfo.password !== password) {
            if (errorNode) {
              errorNode.textContent = '账号或密码不正确，请重新输入。';
            }
            return;
          }

          if (errorNode) {
            errorNode.textContent = '';
          }

          setApplicantName(accountInfo.displayName);
          setAccountDisplay(account, accountInfo.displayName);

          if (loginPanel) {
            loginPanel.classList.add('app-hidden');
          }
          if (appContent) {
            appContent.classList.remove('app-hidden');
          }
        });
      }
    });
  </script>
</body>
